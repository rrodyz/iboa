; IBOA ERP — OPcache production (PHP 8.2)
; Installation VPS :
;   sudo cp php-opcache.ini /etc/php/8.2/fpm/conf.d/99-iboa-opcache.ini
;   sudo systemctl restart php8.2-fpm
; ══════════════════════════════════════════════════════════════════════

[opcache]
; Activer OPcache
opcache.enable=1
opcache.enable_cli=1

; Mémoire : 256 MB pour Laravel ERP (498 PHP + ~8000 vendor)
opcache.memory_consumption=256
opcache.interned_strings_buffer=32
opcache.max_accelerated_files=20000
opcache.max_wasted_percentage=5

; Prod : désactiver revalidation → gain 15-25% — après deploy: php artisan opcache:clear
opcache.validate_timestamps=0
opcache.revalidate_freq=0

; Conserver les commentaires (annotations Eloquent, PHPDoc)
opcache.save_comments=1

; JIT PHP 8.2 — mode tracing (optimal pour Laravel controllers)
opcache.jit=1255
opcache.jit_buffer_size=128M

; Preload : charger les classes Laravel au démarrage FPM
; Décommenter une fois le fichier deploy/preload.php créé
; opcache.preload=/var/www/iboa/public_html/deploy/preload.php
; opcache.preload_user=www-data

; Sécurité
opcache.restrict_api=""

; Monitoring (désactiver en prod sensible)
; opcache.file_cache=/tmp/opcache
