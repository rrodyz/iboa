; A3 ERP — Configuration PHP OPcache (production)
; ═══════════════════════════════════════════════════════════════════════════════
; Copier vers : /etc/php/8.2/fpm/conf.d/10-opcache-a3erp.ini
; Recharger :   systemctl reload php8.2-fpm
; ═══════════════════════════════════════════════════════════════════════════════

[opcache]
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.max_wasted_percentage=10
opcache.validate_timestamps=0      ; 0 = pas de rechargement auto (prod) — lancer php artisan opcache:clear après déploiement
opcache.revalidate_freq=0
opcache.fast_shutdown=1
opcache.enable_file_override=0
opcache.preload=/home/votre-domaine.com/public_html/opcache_preload.php
opcache.preload_user=www-data
