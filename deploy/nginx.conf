# ═══════════════════════════════════════════════════════════════════════════════
# A3 ERP — Configuration Nginx (VPS / CyberPanel)
# ═══════════════════════════════════════════════════════════════════════════════
# Chemin sur le VPS : /etc/nginx/sites-available/a3erp
# Activer :           ln -s /etc/nginx/sites-available/a3erp /etc/nginx/sites-enabled/
# Tester :            nginx -t
# Recharger :         systemctl reload nginx
# ═══════════════════════════════════════════════════════════════════════════════

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name votre-domaine.com www.votre-domaine.com;

    # Let's Encrypt challenge (CyberPanel gère automatiquement)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Serveur HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name votre-domaine.com www.votre-domaine.com;

    # ── Racine Laravel (dossier public/) ─────────────────────────────────────
    root /home/votre-domaine.com/public_html/public;
    index index.php;

    # ── SSL (CyberPanel gère les certificats Let's Encrypt) ──────────────────
    ssl_certificate     /etc/letsencrypt/live/votre-domaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/votre-domaine.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Compression gzip ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-font-ttf font/opentype image/svg+xml;

    # ── Cache assets statiques ────────────────────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|woff|woff2|ttf|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Sécurité : bloquer accès aux fichiers sensibles ───────────────────────
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }
    location ~ /(vendor|node_modules|storage/logs|database)/ {
        deny all;
        return 404;
    }

    # ── Laravel : toutes les requêtes vers index.php ──────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_hide_header X-Powered-By;

        # Timeouts pour les PDF/exports lourds
        fastcgi_read_timeout 120;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/a3erp_access.log;
    error_log  /var/log/nginx/a3erp_error.log warn;

    # ── Headers de sécurité additionnels (Nginx niveau) ───────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Limite taille upload (photos employés, pièces jointes) ───────────────
    client_max_body_size 20M;
}
